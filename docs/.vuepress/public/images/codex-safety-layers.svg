<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" fill="none" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#F8FAFC" rx="28"/>
  <defs>
    <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <text x="72" y="78" fill="#111827" font-size="38" font-weight="700">沙盒、审批与配置的关系</text>
    <text x="72" y="116" fill="#475569" font-size="20">配置项定义权限组合；沙盒管边界，审批策略管触发，审批人管判断。</text>

    <rect x="72" y="150" width="1136" height="150" fill="#EEF2FF" stroke="#6366F1" stroke-width="2" rx="20"/>
    <text x="108" y="196" fill="#1E1B4B" font-size="27" font-weight="700">配置项 config.toml</text>
    <text x="108" y="228" fill="#334155" font-size="19">把当前任务的权限组合写成字段。</text>

    <rect x="112" y="246" width="300" height="38" fill="#FFFFFF" stroke="#A5B4FC" rx="12"/>
    <text x="262" y="271" fill="#3730A3" font-size="17" font-weight="700" text-anchor="middle">sandbox_mode：沙盒范围</text>

    <rect x="490" y="246" width="300" height="38" fill="#FFFFFF" stroke="#A5B4FC" rx="12"/>
    <text x="640" y="271" fill="#3730A3" font-size="17" font-weight="700" text-anchor="middle">approval_policy：审批策略</text>

    <rect x="868" y="246" width="300" height="38" fill="#FFFFFF" stroke="#A5B4FC" rx="12"/>
    <text x="1018" y="271" fill="#3730A3" font-size="17" font-weight="700" text-anchor="middle">approvals_reviewer：审批人</text>

    <rect x="72" y="350" width="244" height="154" fill="#ECFDF5" stroke="#10B981" stroke-width="2" rx="18"/>
    <text x="104" y="396" fill="#064E3B" font-size="26" font-weight="700">任务动作</text>
    <text x="104" y="432" fill="#334155" font-size="18">改文件、跑命令、联网，</text>
    <text x="104" y="460" fill="#334155" font-size="18">或调用工具。</text>

    <path d="M326 427 H350" stroke="#94A3B8" stroke-width="3" marker-end="url(#flowArrow)"/>

    <rect x="372" y="350" width="244" height="154" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5" rx="18"/>
    <text x="404" y="396" fill="#1E3A8A" font-size="26" font-weight="700">沙盒</text>
    <text x="404" y="432" fill="#334155" font-size="18">判断动作是否仍在</text>
    <text x="404" y="460" fill="#334155" font-size="18">文件、网络、命令边界内。</text>

    <path d="M626 427 H650" stroke="#94A3B8" stroke-width="3" marker-end="url(#flowArrow)"/>

    <rect x="672" y="350" width="244" height="154" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2.5" rx="18"/>
    <text x="704" y="396" fill="#78350F" font-size="26" font-weight="700">审批策略</text>
    <text x="704" y="432" fill="#334155" font-size="18">决定越界请求是确认、</text>
    <text x="704" y="460" fill="#334155" font-size="18">拒绝，还是不再询问。</text>

    <path d="M926 427 H950" stroke="#94A3B8" stroke-width="3" marker-end="url(#flowArrow)"/>

    <rect x="972" y="350" width="236" height="154" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" rx="18"/>
    <text x="1004" y="396" fill="#334155" font-size="26" font-weight="700">审批人</text>
    <text x="1004" y="432" fill="#334155" font-size="18">由 user 或 auto_review</text>
    <text x="1004" y="460" fill="#334155" font-size="18">判断是否放行。</text>

    <rect x="72" y="552" width="1136" height="74" fill="#F1F5F9" stroke="#CBD5E1" rx="16"/>
    <text x="104" y="592" fill="#334155" font-size="19">读图顺序：任务动作先进入沙盒；沙盒内直接执行；越界后才交给审批策略和审批人。</text>
  </g>
</svg>
